    <div class="formulario">
        <h2>Formulario de Adopción</h2>
        <p>Completa tus datos para iniciar el proceso.</p>
        
        <form action="#" method="POST">
            
            <div class="grupo-campo">
                <label for="nombre">Nombre *</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
             <div class="grupo-campo">
                <label for="nombre">Apellidos *</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            <div class="grupo-campo">
                <label for="nombre">Ciudad *</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>


            <div class="grupo-campo">
                <label for="correo">Correo Electrónico *</label>
                <input type="email" id="correo" name="correo" required>
            </div>
            
            <div class="grupo-campo">
                <label for="telefono">Teléfono *</label>
                <input type="tel" id="telefono" name="telefono" required>
            </div>
            
            <div class="grupo-campo">
                <label for="tipo-vivienda">Tipo de consulta*</label>
                <select id="tipo-vivienda" name="tipo-vivienda" required>
                    <option value="" disabled selected>Selecciona una opción</option>
                    <option value="Adopcion">Adopción</option>
                    <option value="Donacion"> Donación</option>
                    <option value="Voluntariado">Voluntariado </option>
                    
                </select>
            </div>

            <div class="grupo-campo">
                <label for="motivo">¿Por qué deseas adoptar? *</label>
                <textarea id="motivo" name="motivo" rows="3" required></textarea>
            </div>

            <button type="submit" class="btn-enviar">Enviar Solicitud</button>
            
        </form>
    </div>
